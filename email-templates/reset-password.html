<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; background-color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color: #0f172a; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="max-width: 480px; width: 100%;">
          <!-- Logo -->
          <tr>
            <td align="center" style="padding-bottom: 32px;">
              <table cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding-right: 12px; background-color: #ffffff; border-radius: 10px; padding: 6px;">
                    <img src="https://ohmsbapnwxjaroznkwxu.supabase.co/storage/v1/object/public/assets/favicon.ico.png" alt="TradeGrail" width="32" height="32" style="display: block;" />
                  </td>
                  <td style="padding-left: 4px;">
                    <span style="font-size: 20px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">TRADEGRAIL</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Card -->
          <tr>
            <td style="background-color: #1e293b; border-radius: 16px; border: 1px solid #334155; padding: 40px 32px;">
              <!-- Title -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom: 12px;">
                    <h1 style="margin: 0; font-size: 22px; font-weight: 800; color: #ffffff;">重置你的密码</h1>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-bottom: 32px;">
                    <p style="margin: 0; font-size: 14px; color: #94a3b8; line-height: 1.6;">我们收到了你的密码重置请求。点击下方按钮设置新密码。</p>
                  </td>
                </tr>
              </table>
              <!-- CTA Button -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom: 32px;">
                    <a href="{{ .ConfirmationURL }}" style="display: inline-block; background-color: #f59e0b; color: #0f172a; padding: 14px 40px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 15px; letter-spacing: 0.02em;">重置密码</a>
                  </td>
                </tr>
              </table>
              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="border-top: 1px solid #334155; padding-top: 24px;">
                    <p style="margin: 0; font-size: 12px; color: #64748b; line-height: 1.6;">如果按钮无法点击，请复制以下链接到浏览器：</p>
                    <p style="margin: 8px 0 0; font-size: 12px; color: #6366f1; word-break: break-all;">{{ .ConfirmationURL }}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top: 32px;">
              <p style="margin: 0; font-size: 11px; color: #475569;">如果你没有请求重置密码，请忽略此邮件，你的密码不会被更改。</p>
              <p style="margin: 8px 0 0; font-size: 11px; color: #334155;">&copy; 2026 TradeGrail. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
